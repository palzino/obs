apiVersion: 1

datasources:
- name: Prometheus
  uid: prometheus
  type: prometheus
  url: http://prometheus:9090
  isDefault: true
  access: proxy
  editable: true
- name: Tempo
  uid: tempo
  type: tempo
  url: http://tempo:3200
  access: proxy
  editable: true
  jsonData:
    tracesToLogsV2:
      datasourceUid: loki
      filterByTraceID: true
      filterBySpanID: false
      spanStartTimeShift: "-1h"
      spanEndTimeShift: "1h"
    tracesToMetrics:
      datasourceUid: prometheus
    serviceMap:
      datasourceUid: prometheus
- name: Loki
  uid: loki
  type: loki
  url: http://loki:3100
  access: proxy
  editable: true
