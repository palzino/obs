
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'home-lab'
    environment: 'production'

# Alloy handles all scraping and sends metrics here via remote_write API
# The docker-compose flags enable both the remote write receiver and the OTLP receiver.

otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.name
    - service.namespace
    - service.instance.id
    - service.version
    - deployment.environment.name

storage:
  tsdb:
    out_of_order_time_window: 30m

# No scrape_configs needed - Alloy does all the scraping
# This prevents duplicate metrics and makes Alloy the central collection point

scrape_configs:
  # Optional: Keep Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'cadvisor'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.16:8050','cadvisor:8080','192.168.0.145:8050','192.168.1.245:8050']
# Optional: Add recording rules for aggregations
# rule_files:
#   - "rules/*.yml"

# Optional: Add alerting configuration
